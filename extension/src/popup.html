<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      font-size: 13px;
      line-height: 1.5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #262626;
    }
    .logo {
      width: 20px;
      height: 20px;
      background: #10b981;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      color: #fff;
    }
    .title { font-weight: 600; font-size: 14px; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      font-size: 12px;
      color: #a3a3a3;
      border-bottom: 1px solid #262626;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-dot.connected { background: #10b981; }
    .status-dot.disconnected { background: #ef4444; }
    .actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: transparent;
      color: #e5e5e5;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background 100ms, border-color 100ms;
    }
    .btn:hover {
      background: #1a1a1a;
      border-color: #404040;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #10b981;
      border-color: #10b981;
      color: #fff;
      font-weight: 500;
    }
    .btn-primary:hover {
      background: #059669;
      border-color: #059669;
    }
    .btn-icon {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #262626;
      font-size: 11px;
      color: #525252;
      text-align: center;
    }
    .footer a {
      color: #10b981;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">F</div>
    <span class="title">Forge</span>
  </div>

  <div class="status" id="status">
    <div class="status-dot disconnected" id="status-dot"></div>
    <span id="status-text">Not connected</span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-capture">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      Capture Section
    </button>
    <button class="btn" id="btn-inspect">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Inspect Element
    </button>
    <button class="btn" id="btn-copy-html">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copy Selection HTML
    </button>
    <button class="btn" id="btn-settings">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Extension Settings
    </button>
  </div>

  <div class="footer">
    Forge v0.1.0 · <a href="http://localhost:5173" target="_blank">Open App</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
